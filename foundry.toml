[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 10000 }
invariant = { runs = 500, depth = 100 }

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
mainnet  = "${MAINNET_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
